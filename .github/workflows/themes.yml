name: Themes

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  # Validate every theme's .peltontheme container. Runs on PRs and on main.
  validate:
    name: Validate themes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate .peltontheme files
        run: python3 scripts/validate_theme.py

  # Regenerate the metadata header in each theme README and commit it back.
  # Only on main: pull requests from forks cannot push, and the header is not
  # required for review — it lands once the PR is merged.
  render-readmes:
    name: Render theme READMEs
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render READMEs from manifests
        run: python3 scripts/render_readme.py
      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add themes
            git commit -m "chore: render theme README metadata"
            git push
          else
            echo "READMEs already up to date."
          fi
