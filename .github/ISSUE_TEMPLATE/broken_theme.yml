name: Report a broken theme
description: A theme in this repository fails to import, looks wrong, or broke on a new Pelton version.
title: "[Broken] <theme name>"
labels: ["broken-theme", "needs-triage"]
body:
  - type: input
    id: theme
    attributes:
      label: Which theme?
      description: The folder name under themes/, e.g. amber-marigold.
      placeholder: e.g. amber-marigold
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What is wrong?
      options:
        - Fails to import
        - Imports but looks wrong / unreadable
        - Broke after a Pelton update
        - Missing or broken files
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happens
      description: Describe the problem. Include the exact error text if Pelton showed one.
    validations:
      required: true
  - type: input
    id: pelton_version
    attributes:
      label: Pelton version
      placeholder: e.g. v1.2.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or logs
      description: Anything that helps us see the problem.
