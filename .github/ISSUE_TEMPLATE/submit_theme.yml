name: Submit a theme
description: Share a theme when you would rather not open a pull request yourself.
title: "[Theme] <your theme name>"
labels: ["theme-submission", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a theme! 🎨

        > [!NOTE]
        > If you are comfortable with git, opening a **pull request** is faster
        > and gives you full credit in the history. See
        > [CONTRIBUTING.md](https://github.com/TRC-Loop/pelton-themes/blob/main/CONTRIBUTING.md).
        > This form is the no-git fallback: a maintainer turns it into a PR for you.
  - type: input
    id: name
    attributes:
      label: Theme name
      placeholder: e.g. Amber Marigold
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author / credit
      description: How you want to be credited, and a link if you like.
      placeholder: e.g. Arne K. (https://github.com/...)
    validations:
      required: true
  - type: dropdown
    id: base
    attributes:
      label: Base
      description: Which built-in look fills anything the theme does not override.
      options:
        - dark
        - light
    validations:
      required: true
  - type: input
    id: made_for
    attributes:
      label: Made for Pelton version
      description: The Pelton version you built and tested against (manifest `pelton.min`).
      placeholder: e.g. 1.0.8
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License name
      description: The license name or SPDX id you release the theme under.
      placeholder: e.g. MIT, Apache-2.0, CC-BY-4.0
    validations:
      required: true
  - type: textarea
    id: license_text
    attributes:
      label: Full license text
      description: |
        Paste the **complete** text of your license here. It becomes the
        `LICENSE` file next to your theme. Not sure which to choose, or need the
        text? See [choosealicense.com](https://choosealicense.com/). Remember to
        **replace the placeholders** in the license (for example `[year]` and
        `[fullname]`) with the real year and your name.
      placeholder: |
        MIT License

        Copyright (c) 2026 Your Name

        Permission is hereby granted, free of charge, to any person obtaining a copy
        ...
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > GitHub does not allow attaching `.peltontheme` files here. A
        > `.peltontheme` is already a zip, so just **rename** your
        > `YourTheme.peltontheme` to `YourTheme.zip` (or drop it inside a new
        > `.zip`) and attach that. Once it is in the repo, CI renames it back
        > to `.peltontheme` automatically. You do not need to do anything else.
  - type: textarea
    id: file
    attributes:
      label: Your theme file(s) (attached as .zip)
      description: |
        Rename each `.peltontheme` to `.zip`, then drag and drop it into this box.
        Shipping different flavors of the same theme (for example a light and a
        dark variant)? Attach all of them here and they land in the same theme
        folder together.
      placeholder: Drop your .zip file(s) here. GitHub attaches each one and inserts a link.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A sentence or two, plus any preview screenshots, links or socials.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: The theme imports cleanly in Pelton (Settings → Themes → Import theme).
          required: true
        - label: It contains no remote `url()` or `@import`; fonts and images are bundled.
          required: true
        - label: I have the right to share this theme.
          required: true
        - label: A preview image is included (recommended).
          required: false
        - label: I renamed the file to `.zip` for upload (GitHub rejects `.peltontheme`).
          required: true
